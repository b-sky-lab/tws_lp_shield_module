# Enable extended NKRO report for INT/LANG keys on macOS
CONFIG_ZMK_HID_KEYBOARD_NKRO_EXTENDED_REPORT=y

# Bluetooth TX Power (increased for peripheral to ensure reliable transmission to central)
CONFIG_BT_CTLR_TX_PWR_4=y

# Charlieplex kscan timing settings (improve stability on low battery voltage)
CONFIG_ZMK_KSCAN_CHARLIEPLEX_WAIT_BEFORE_INPUTS=1
CONFIG_ZMK_KSCAN_CHARLIEPLEX_WAIT_BETWEEN_OUTPUTS=1

# Increase event queue size for fast typing
CONFIG_ZMK_KSCAN_EVENT_QUEUE_SIZE=16

# Increase peripheral position queue size for fast typing
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_POSITION_QUEUE_SIZE=20

# Increase peripheral thread priority for faster response (lower number = higher priority)
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_PRIORITY=3

# Increase peripheral stack size for stability
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_STACK_SIZE=1024

# Eager debounce for faster key press detection
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=0
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Sleep settings
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# RGB LED Widget settings
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_RGBLED_WIDGET_SHOW_LAYER_CHANGE=n
