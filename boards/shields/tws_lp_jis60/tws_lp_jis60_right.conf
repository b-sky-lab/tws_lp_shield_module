# Enable extended NKRO report for INT/LANG keys on macOS
CONFIG_ZMK_HID_KEYBOARD_NKRO_EXTENDED_REPORT=y

# Bluetooth TX Power
CONFIG_BT_CTLR_TX_PWR_MINUS_12=y

# Charlieplex scanning - Improve responsiveness for simultaneous key presses on battery
# Wait time in ticks before reading inputs after setting output active
CONFIG_ZMK_KSCAN_CHARLIEPLEX_WAIT_BEFORE_INPUTS=10

# Wait time in ticks between outputs to allow settling
CONFIG_ZMK_KSCAN_CHARLIEPLEX_WAIT_BETWEEN_OUTPUTS=10

# Eager debouncing - Reduce key press latency
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Sleep settings
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# RGB LED Widget settings
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_RGBLED_WIDGET_SHOW_LAYER_CHANGE=n
